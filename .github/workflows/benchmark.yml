name: Benchmark

on:
  workflow_dispatch:
    inputs:
      seed_profile:
        description: Seed profile
        required: true
        default: small
        type: choice
        options:
          - small
          - medium
          - large

permissions:
  contents: write

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run benchmark
        env:
          SEED_PROFILE: ${{ inputs.seed_profile }}
        run: task bench:all:scaled

      - name: Generate SVG report
        run: |
          mkdir -p bench-report/bench/latest
          node bench/scripts/generate-report-svg.mjs \
            --variants=simple-scaled,simple-rs-scaled,distributed-scaled \
            --output=bench-report/bench/latest/summary.svg \
            --title="Alias URL benchmark (${{ inputs.seed_profile }})"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: bench-report

      - name: Publish report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: bench-report
          keep_files: true
