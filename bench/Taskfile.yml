version: '3'

tasks:
  down:
    internal: true
    desc: ベンチ対象の全構成を停止し、ボリュームを削除する
    cmds:
      - task simple:down
      - task simple-rs:down
      - task distributed:down

  all:
    desc: simple / simple-rs / distributed の通常ベンチを実行して比較する
    cmds:
      - task: simple
      - task: simple-rs
      - task: distributed
      - task: compare:all

  all:medium:
    desc: medium データセットで通常ベンチを実行して比較する
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-medium-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=medium RUN_ID="${RUN_ID}" task bench:all

  all:large:
    desc: large データセットで通常ベンチを実行して比較する
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-large-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=large RUN_ID="${RUN_ID}" task bench:all

  all:scaled:
    desc: simple / simple-rs / distributed のスケール構成ベンチを実行して比較する
    cmds:
      - task: simple:scaled
      - task: simple-rs:scaled
      - task: distributed:scaled
      - task: compare:scaled:all

  all:medium:scaled:
    desc: medium データセットでスケール構成ベンチを実行して比較する
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-medium-scaled-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=medium RUN_ID="${RUN_ID}" task bench:all:scaled

  all:large:scaled:
    desc: large データセットでスケール構成ベンチを実行して比較する
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-large-scaled-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=large RUN_ID="${RUN_ID}" task bench:all:scaled

  compare:all:
    desc: 最新の通常ベンチ結果を 3 構成で比較する
    cmds:
      - node bench/scripts/compare-results.mjs --variants=simple,simple-rs,distributed

  compare:scaled:all:
    desc: 最新のスケール構成ベンチ結果を 3 構成で比較する
    cmds:
      - node bench/scripts/compare-results.mjs --variants=simple-scaled,simple-rs-scaled,distributed-scaled

  simple:
    internal: true
    desc: simple の通常ベンチを実行する
    cmds:
      - task: down
      - task simple:up
      - node bench/scripts/run-benchmark-flow.mjs --variant simple --store mysql --variant-dir variants/simple

  simple:scaled:
    internal: true
    desc: simple のスケール構成ベンチを実行する
    cmds:
      - task: down
      - task simple:up:scaled
      - node bench/scripts/run-benchmark-flow.mjs --variant simple --result-variant simple-scaled --run-id-prefix simple-scaled --store mysql --variant-dir variants/simple

  simple-rs:
    internal: true
    desc: simple-rs の通常ベンチを実行する
    cmds:
      - task: down
      - task simple-rs:up
      - node bench/scripts/run-benchmark-flow.mjs --variant simple-rs --store mysql --variant-dir variants/simple-rs

  simple-rs:scaled:
    internal: true
    desc: simple-rs のスケール構成ベンチを実行する
    cmds:
      - task: down
      - task simple-rs:up:scaled
      - node bench/scripts/run-benchmark-flow.mjs --variant simple-rs --result-variant simple-rs-scaled --run-id-prefix simple-rs-scaled --store mysql --variant-dir variants/simple-rs

  distributed:
    internal: true
    desc: distributed の通常ベンチを実行する
    cmds:
      - task: down
      - task distributed:up
      - node bench/scripts/run-benchmark-flow.mjs --variant distributed --store redis --variant-dir variants/distributed

  distributed:scaled:
    internal: true
    desc: distributed のスケール構成ベンチを実行する
    cmds:
      - task: down
      - task distributed:up:scaled
      - node bench/scripts/run-benchmark-flow.mjs --variant distributed --result-variant distributed-scaled --run-id-prefix distributed-scaled --store redis --variant-dir variants/distributed
