version: '3'

tasks:
  down:
    desc: Stop all benchmark variants and remove their volumes
    cmds:
      - task simple:down
      - task simple-rs:down
      - task distributed:down

  all:
    desc: Run simple, simple-rs, distributed benchmarks, then compare all
    cmds:
      - task bench:simple
      - task bench:simple-rs
      - task bench:distributed
      - task bench:compare:all

  all:medium:
    desc: Run all standard benchmarks with the medium bulk-seeded dataset
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-medium-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=medium RUN_ID="${RUN_ID}" task bench:all

  all:large:
    desc: Run all standard benchmarks with the large bulk-seeded dataset
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-large-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=large RUN_ID="${RUN_ID}" task bench:all

  all:scaled:
    desc: Run scaled simple, simple-rs, distributed benchmarks, then compare all
    cmds:
      - task bench:simple:scaled
      - task bench:simple-rs:scaled
      - task bench:distributed:scaled
      - task bench:compare:scaled:all

  all:medium:scaled:
    desc: Run all scaled benchmarks with the medium bulk-seeded dataset
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-medium-scaled-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=medium RUN_ID="${RUN_ID}" task bench:all:scaled

  all:large:scaled:
    desc: Run all scaled benchmarks with the large bulk-seeded dataset
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-all-large-scaled-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=large RUN_ID="${RUN_ID}" task bench:all:scaled

  redirect:direct:simple-rs:
    desc: Run direct redirect benchmarks for simple-rs and distributed, then compare
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-redirect-direct-simple-rs-$(date +%Y%m%d%H%M%S)}"
        RUN_ID="${RUN_ID}" task bench:simple-rs:redirect:direct
        RUN_ID="${RUN_ID}" task bench:distributed:redirect:direct
        task bench:compare:direct:redirect:simple-rs

  redirect:direct:simple-rs:medium:
    desc: Run direct redirect benchmarks for simple-rs and distributed with medium seed data
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-redirect-direct-simple-rs-medium-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=medium RUN_ID="${RUN_ID}" task bench:redirect:direct:simple-rs

  redirect:direct:simple-rs:large:
    desc: Run direct redirect benchmarks for simple-rs and distributed with large seed data
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-redirect-direct-simple-rs-large-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=large RUN_ID="${RUN_ID}" task bench:redirect:direct:simple-rs

  redirect:scaled:simple-rs:
    desc: Run scaled redirect benchmarks for simple-rs and distributed, then compare
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-redirect-scaled-simple-rs-$(date +%Y%m%d%H%M%S)}"
        RUN_ID="${RUN_ID}" task bench:simple-rs:redirect:scaled
        RUN_ID="${RUN_ID}" task bench:distributed:redirect:scaled
        task bench:compare:redirect:scaled:simple-rs

  redirect:scaled:simple-rs:medium:
    desc: Run scaled redirect benchmarks for simple-rs and distributed with medium seed data
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-redirect-scaled-simple-rs-medium-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=medium RUN_ID="${RUN_ID}" task bench:redirect:scaled:simple-rs

  redirect:scaled:simple-rs:large:
    desc: Run scaled redirect benchmarks for simple-rs and distributed with large seed data
    cmds:
      - |
        set -eu
        RUN_ID="${RUN_ID:-redirect-scaled-simple-rs-large-$(date +%Y%m%d%H%M%S)}"
        SEED_PROFILE=large RUN_ID="${RUN_ID}" task bench:redirect:scaled:simple-rs

  compare:
    desc: Compare the latest simple and distributed k6 benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs

  compare:all:
    desc: Compare the latest simple, simple-rs, and distributed k6 benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --variants=simple,simple-rs,distributed

  compare:direct:create:
    desc: Compare latest direct create benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-direct --distributed-variant=distributed-direct --scenarios=create-existing,create

  compare:direct:redirect:
    desc: Compare latest direct redirect benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-direct --distributed-variant=distributed-redirect-direct --scenarios=redirect

  compare:direct:redirect:simple-rs:
    desc: Compare latest direct redirect benchmark results between simple-rs and distributed
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-rs-direct --distributed-variant=distributed-redirect-direct --scenarios=redirect

  compare:redirect:scaled:simple-rs:
    desc: Compare latest scaled redirect benchmark results between simple-rs and distributed
    cmds:
      - node bench/scripts/compare-results.mjs --variants=simple-rs-redirect-scaled,distributed-redirect-scaled --scenarios=redirect

  compare:scaled:
    desc: Compare the latest scaled simple and distributed k6 benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-scaled --distributed-variant=distributed-scaled

  compare:scaled:all:
    desc: Compare the latest scaled simple, simple-rs, and distributed k6 benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --variants=simple-scaled,simple-rs-scaled,distributed-scaled

  compare:simple-rs:
    desc: Compare the latest simple PHP and simple Rust benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple --distributed-variant=simple-rs

  compare:simple-rs:direct:
    desc: Compare the latest direct simple PHP and simple Rust benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-direct --distributed-variant=simple-rs-direct

  compare:simple-rs:scaled:
    desc: Compare the latest scaled simple PHP and simple Rust benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-scaled --distributed-variant=simple-rs-scaled

  simple:
    desc: Run the full k6 benchmark flow against the simple variant with nginx gateway
    cmds:
      - task bench:down
      - task simple:up
      - |
        set -eu
        RUN_ID="${RUN_ID:-simple-$(date +%Y%m%d%H%M%S)}"
        BASE_URL="${BASE_URL:-http://localhost:8080}"
        RESULT_DIR="bench/results/simple/${RUN_ID}"

        mkdir -p "${RESULT_DIR}"

        echo "variant=simple"
        echo "run_id=${RUN_ID}"
        echo "base_url=${BASE_URL}"

        for attempt in $(seq 1 60); do
          if curl -fsS "${BASE_URL}/health" >/dev/null; then
            break
          fi

          if [ "${attempt}" -eq 60 ]; then
            echo "Backend did not become healthy: ${BASE_URL}/health" >&2
            exit 1
          fi

          sleep 1
        done

        node bench/scripts/run-seed.mjs \
          --store mysql \
          --variant-dir variants/simple \
          --base-url "${BASE_URL}" \
          --result-dir "${RESULT_DIR}" \
          --run-id "${RUN_ID}"

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/warmup-redirect.json" \
          bench/k6/setup/warmup-redirect.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/redirect.json" \
          bench/k6/scenarios/redirect.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/create-existing.json" \
          bench/k6/scenarios/create-existing.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/warmup-create.json" \
          bench/k6/setup/warmup-create.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/create.json" \
          bench/k6/scenarios/create.ts

        echo "results=${RESULT_DIR}"

