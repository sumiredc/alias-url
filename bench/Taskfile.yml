version: '3'

tasks:
  compare:
    desc: Compare the latest simple and distributed k6 benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs

  compare:direct:create:
    desc: Compare latest direct create benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-direct --distributed-variant=distributed-direct --scenarios=create-existing,create

  compare:direct:redirect:
    desc: Compare latest direct redirect benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-direct --distributed-variant=distributed-redirect-direct --scenarios=redirect

  compare:scaled:
    desc: Compare the latest scaled simple and distributed k6 benchmark results
    cmds:
      - node bench/scripts/compare-results.mjs --simple-variant=simple-scaled --distributed-variant=distributed-scaled

  simple:
    desc: Run the full k6 benchmark flow against the simple variant with nginx gateway
    cmds:
      - task distributed:down
      - task simple:up
      - |
        set -eu
        RUN_ID="${RUN_ID:-simple-$(date +%Y%m%d%H%M%S)}"
        BASE_URL="${BASE_URL:-http://localhost:8080}"
        RESULT_DIR="bench/results/simple/${RUN_ID}"

        mkdir -p "${RESULT_DIR}"

        echo "variant=simple"
        echo "run_id=${RUN_ID}"
        echo "base_url=${BASE_URL}"

        for attempt in $(seq 1 60); do
          if curl -fsS "${BASE_URL}/health" >/dev/null; then
            break
          fi

          if [ "${attempt}" -eq 60 ]; then
            echo "Backend did not become healthy: ${BASE_URL}/health" >&2
            exit 1
          fi

          sleep 1
        done

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/seed-aliases.json" \
          bench/k6/setup/seed-aliases.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/warmup-redirect.json" \
          bench/k6/setup/warmup-redirect.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/redirect.json" \
          bench/k6/scenarios/redirect.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/create-existing.json" \
          bench/k6/scenarios/create-existing.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/warmup-create.json" \
          bench/k6/setup/warmup-create.ts

        BASE_URL="${BASE_URL}" RUN_ID="${RUN_ID}" k6 run \
          --summary-export "${RESULT_DIR}/create.json" \
          bench/k6/scenarios/create.ts

        echo "results=${RESULT_DIR}"

