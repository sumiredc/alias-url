services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - backend-redirect

  backend:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - path: backend/.env.example
      - path: backend/.env
        required: false
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy

  backend-redirect:
    build:
      context: ./backend
      dockerfile: Dockerfile.redirect
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - path: backend/.env.example
      - path: backend/.env
        required: false
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy

  redis-1:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - redis_1_data:/data

  redis-2:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - redis_2_data:/data

  redis-3:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - redis_3_data:/data

volumes:
  redis_1_data:
  redis_2_data:
  redis_3_data:
