services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - path: backend/.env.example
      - path: backend/.env
        required: false
    environment:
      DB_SSL_MODE: ${DB_SSL_MODE:-required}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-64}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-0}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:9.7
    ports:
      - "3306:3306"
    env_file:
      - path: backend/.env.example
      - path: backend/.env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data:
